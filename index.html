                    "最后蒸馏即可。"
                ],
                effect: "减少110生命值，服用后必死无疑，高品质药剂还将会使生命值更快地降低。相比于涂抹在武器上，把它洒进别人的餐食里才是明智之选。"
            },
            {
                name: "散弹火药",
                base: "水",
                materials: ["1硫磺", "1硝石", "1浸泡炭"],
                steps: [
                    "研磨1硫磺和1硝石后将其加入锅中。",
                    "熬煮三轮。",
                    "研磨1浸泡炭后将其加入锅中。",
                    "熬煮一轮。",
                    "将材料倒入研钵中研磨。"
                ],
                effect: "用于发射铁屑等小型射弹的火药，可在短距离内随意击穿任意目标，但长距离难有杀伤力。出于安全考虑，装填时务必保持清醒。"
            },
            {
                name: "铅弹火药",
                base: "水",
                materials: ["1硫磺", "1硝石", "1木炭"],
                steps: [
                    "研磨1硫磺和1硝石后将其加入锅中。",
                    "熬煮两轮。",
                    "研磨1木炭后将其加入锅中。",
                    "熬煮两轮。",
                    "将材料倒入研钵中研磨。"
                ],
                effect: "用于发射铅弹的火药，即便是最坚硬的板甲也无法承受如此火药轰出的近距离射击。出于安全考虑，装填时务必保持清醒。"
            }
        ];
        
        // 提取所有唯一材料（从包含数量的材料字符串中提取材料名称）
        const allMaterials = new Set();
        recipes.forEach(recipe => {
            recipe.materials.forEach(material => {
                // 提取材料名称（去除数量）
                const materialName = material.replace(/^\d+/, '').trim();
                allMaterials.add(materialName);
            });
        });
        
        // 生成材料选择标签
        const materialsSelector = document.getElementById('materials-selector');
        allMaterials.forEach(material => {
            const tag = document.createElement('div');
            tag.className = 'material-tag';
            tag.textContent = material;
            tag.onclick = () => {
                tag.classList.toggle('selected');
            };
            materialsSelector.appendChild(tag);
        });
        
        // 为底料选项添加点击事件（单选，但允许取消选择）
        document.querySelectorAll('#base-selector .base-material-tag').forEach(tag => {
            tag.onclick = () => {
                const isSelected = tag.classList.contains('selected');
                // 移除所有选中状态
                document.querySelectorAll('#base-selector .base-material-tag').forEach(t => {
                    t.classList.remove('selected');
                });
                // 如果之前未选中，则选中当前项；如果已选中，则保持取消状态
                if (!isSelected) {
                    tag.classList.add('selected');
                }
            };
        });
        
        // 搜索配方
        function searchRecipes() {
            const nameSearch = document.getElementById('name-search').value.toLowerCase();
            
            // 获取选中的材料
            const selectedMaterials = Array.from(document.querySelectorAll('.material-tag.selected'))
                .map(tag => tag.textContent);
            
            // 获取选中的底料（单选）
            const selectedBase = document.querySelector('#base-selector .base-material-tag.selected');
            const selectedBaseValue = selectedBase ? selectedBase.getAttribute('data-base') : '';
            
            // 过滤配方
            const filteredRecipes = recipes.filter(recipe => {
                // 按名称搜索
                const nameMatch = recipe.name.toLowerCase().includes(nameSearch);
                
                // 按选中的材料搜索（修改为包含任一选中材料）
                const selectedMaterialsMatch = selectedMaterials.length === 0 || 
                    selectedMaterials.some(selectedMaterial => 
                        recipe.materials.some(material => 
                            material.replace(/^\d+/, '').trim() === selectedMaterial
                        )
                    );
                
                // 按底料搜索（单选）
                const baseMatch = selectedBaseValue === '' || 
                    recipe.base === selectedBaseValue;
                
                return nameMatch && selectedMaterialsMatch && baseMatch;
            });
            
            // 显示结果
            const resultsContainer = document.getElementById('results');
            if (filteredRecipes.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">没有找到匹配的配方</div>';
            } else {
                resultsContainer.innerHTML = `
                    <div class="recipe-grid">
                        ${filteredRecipes.map(recipe => {
                            const materialsHtml = recipe.materials.map(material => {
                                const materialName = material.replace(/^\d+/, '').trim();
                                const isSelected = selectedMaterials.includes(materialName);
                                return isSelected ? `<span class="material-highlight">${material}</span>` : material;
                            }).join('、');
                            
                            return `
                                <div class="recipe-card" onclick="showRecipeDetails(this)">
                                    <h3>${recipe.name}</h3>
                                    <div class="recipe-info">
                                        <strong>底料：</strong>${recipe.base}<br>
                                        <strong>材料：</strong>${materialsHtml}<br>
                                        <strong>效果：</strong>${recipe.effect}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }
        }
        
        // 显示配方详情弹窗
        function showRecipeDetails(element) {
            const recipeName = element.querySelector('h3').textContent;
            const recipe = recipes.find(r => r.name === recipeName);
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <span class="close" onclick="this.parentElement.parentElement.remove()">&times;</span>
                    <h2>${recipe.name}</h2>
                    <div class="recipe-info">
                        <strong>底料：</strong>${recipe.base}<br>
                        <strong>材料：</strong>${recipe.materials.join('、')}<br>
                        <strong>效果：</strong>${recipe.effect}
                    </div>
                    <div class="recipe-steps">
                        <h4>炼金步骤：</h4>
                        <ol>
                            ${recipe.steps.map(step => `<li>${step}</li>`).join('')}
                        </ol>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.style.display = 'block';
            
            // 点击模态框外部关闭
            window.onclick = function(event) {
                if (event.target == modal) {
                    modal.remove();
                }
            };
        }
        
        // 清除输入框内容
        function clearInput(inputId) {
            document.getElementById(inputId).value = '';
            searchRecipes();
        }
        
        // 初始加载时显示所有配方
        window.onload = searchRecipes;
    </script>
</body>
</html>
